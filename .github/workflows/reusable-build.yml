name: Reusable Build
on:
  workflow_call:
    inputs:
      build_type:
        required: true
        type: string
      app_stage:
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: linux_x64
            os: ubuntu-latest
            qt_target: desktop
          - name: android_arm64
            os: ubuntu-latest
            qt_target: android
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Qt for Desktop
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.2.4'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          modules: 'qtimageformats qtshadertools'
          dir: '/opt/hostedtoolcache'
          cache: 'true'
          cache-key-prefix: 'cache-qt-desktop'
          setup-python: 'false'
  
      - name: Install Qt for Android
        if: matrix.qt_target == 'android'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.2.4'
          host: 'linux'
          target: 'android'
          arch: 'android_arm64_v8a'
          dir: '/opt/hostedtoolcache'
          cache: 'true'
          cache-key-prefix: 'cache-qt-android'
          setup-python: 'false'

      - name: Setup Android SDK
        if: matrix.qt_target == 'android'
        uses: android-actions/setup-android@v3
  
      - name: Install Android NDK
        if: matrix.qt_target == 'android'
        run: sdkmanager "ndk;22.1.7171670"

      - name: Predict Next Tag
        id: dry_tag
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: true
          TAG_PREFIX: v
          DEFAULT_BUMP: patch
          PRERELEASE: ${{ inputs.app_stage != 'release' }}
          SUFFIX: ${{ inputs.app_stage != 'release' && inputs.app_stage || '' }}

      - name: Run Tests
        if: matrix.qt_target == 'desktop'
        run: |
          cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Debug
          cmake --build build
          cd build && ctest --output-on-failure

      - name: Build Android APK
        if: matrix.qt_target == 'android'
        shell: bash
        run: |
          # Извлекаем 0.1.2 из v0.1.2-alpha
          RAW_TAG="${{ steps.dry_tag.outputs.new_tag }}"
          CLEAN_VER=$(echo "${RAW_TAG:-v0.0.1}" | sed 's/v//;s/-.*//')
          MANIFEST_PATH="app/android/AndroidManifest.xml"

          sed -i "s/android:versionCode=\"[0-9]*\"/android:versionCode=\"${{ github.run_number }}\"/" $MANIFEST_PATH
          sed -i "s/android:versionName=\"[^\"]*\"/android:versionName=\"$CLEAN_VER\"/" $MANIFEST_PATH

          export ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/22.1.7171670/

          echo '############################################'
          echo "Using QT_ROOT_DIR: $QT_ROOT_DIR"
          echo "Using ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          echo "Using ANDROID_NDK_ROOT: $ANDROID_NDK_ROOT"
          echo "Using JAVA_HOME       : $JAVA_HOME"
          echo "Qt6_DIR               : $Qt6_DIR"
          echo '############################################'

          export Qt6_DIR=$QT_ROOT_DIR/android_arm64_v8a/lib/cmake/Qt6

          cmake -G Ninja -B build/build_android \
              -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
              -DANDROID_NDK=$ANDROID_NDK_ROOT \
              -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
              -DANDROID_ABI=arm64-v8a \
              -DANDROID_PLATFORM=android-23 \
              -DANDROID_STL=c++_shared \
              -DQT_HOST_PATH=$QT_ROOT_DIR/gcc_64 \
              -DCMAKE_PREFIX_PATH=$QT_ROOT_DIR/android_arm64_v8a \
              -DCMAKE_FIND_ROOT_PATH=$QT_ROOT_DIR/android_arm64_v8a \
              -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=ONLY \
              -DCMAKE_BUILD_TYPE=${{ inputs.build_type }}

          ls && tree build || true
          cmake --build build/build_android --target QTtt_make_apk

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: QTtt_${{ matrix.name }}
          path: |
            build/bin/QTtt*
            build/**/*.apk
